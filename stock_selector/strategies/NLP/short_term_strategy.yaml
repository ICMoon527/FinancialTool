# 下午两点半短线策略
# Short-term strategy at 2:30 PM

name: short_term_strategy
display_name: 下午两点半短线策略
description: 下午两点半选股策略，关注尾盘异动，适合短线操作。
category: short_term
core_rules: [1, 2, 3, 4]

instructions: |
  **下午两点半短线策略**

  信号判定标准：

  1. **时间窗口**：
     - 只在下午 14:30-15:00 时间段内选股
     - 关注尾盘半小时的异动

  2. **量能条件**：
     - 当日成交量 > 前5日平均成交量的1.5倍
     - 尾盘30分钟成交量占当日总成交量的30%以上

  3. **价格条件**：
     - 当日涨幅在 3%-5% 之间（避免追高）
     - 价格站稳在MA5之上
     - MACD金叉或即将金叉

  4. **市场环境**：
     - 大盘指数（上证指数/深证成指）当日收红或微跌
     - 个股所属板块整体表现强势

  评分调整：
  - 满足所有条件：score +10
  - 尾盘有大单持续流入：额外 +5
  - 突破近期平台：额外 +3
