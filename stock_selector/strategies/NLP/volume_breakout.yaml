# 放量突破策略
# Volume Breakout Strategy

name: volume_breakout
display_name: 放量突破
description: 成交量放量突破关键阻力位的趋势策略。
category: trend

instructions: |
  **放量突破策略**

  信号判定标准：

  1. **价格突破**：
     - 突破近20日高点
     - 收盘价在突破点上方3%以上

  2. **成交量确认**：
     - 当日成交量 > 前20日平均成交量的2倍
     - 量比 > 2.0

  3. **趋势确认**：
     - MA5 > MA10 > MA20（多头排列）
     - MACD在零轴上方

  评分调整：
  - 同时满足价格和成交量条件：score +10
  - 涨停突破：额外 +5
  - 板块热点：额外 +3
