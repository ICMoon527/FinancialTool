name: short_term_strategy
display_name: 下午两点半短线策略
description: 下午两点半涨幅3%-5%，量比>1，换手率5%-10%，流通市值50亿-200亿，多头向上发散，全天在上证指数上方，两点半后创新高的个股
category: short_term
core_rules: []
required_tools:
  - get_daily_history
  - get_realtime_quote
  - analyze_trend

instructions: |
  **下午两点半短线策略**

  选股条件：
  1. 下午两点半涨幅 3% 到 5%
  2. 剔除量比小于 1 的
  3. 保留换手率 5% 到 10%
  4. 保留流通市值在 50 亿到 200 亿
  5. 留下成交量持续放大的，最好是台阶式
  6. 查看 K 线形态，保留多头向上发散
  7. 叠加上证指数的分时图看，个股要全天在上证指数的上方
  8. 如果筛选出来的个股两点半之后创了新高，就是目标个股
  9. 当回落到均线附近的时候，不跌破就是最好的入场时机
  10. 做短线做好止盈止损，快准狠，快进快出
  11. 盈利之后如果没有按照预期发展也可以直接出场
