optimization:
  max_iterations: 200
  convergence_threshold_pct: 0.1
  adjustment_step_pct: 5.0
  min_score_multiplier: 0.1
  max_score_multiplier: 5.0
  target_return_pct: null
  target_win_rate_pct: 1
  max_drawdown_limit_pct: 0.05
  enable_early_stopping: true
  early_stopping_patience: 10
  random_seed: 1234
  enable_sector_data: true
  optimization_method: grid_search
  optimization_objective: sharpe_ratio
  bayesian_n_calls: 30
  bayesian_n_initial_points: 10
  grid_search_step: 0.1
  normalize_weights: true
  wfa_enabled: true
  wfa_training_window_days: 60
  wfa_testing_window_days: 20
  wfa_step_days: 10
  wfa_num_windows: -1
  wfa_start_date: "2021-01-01"
backtest:
  eval_window_days: 20
  neutral_band_pct: 2.0
  stop_loss_pct: null
  take_profit_pct: null
  engine_version: v1
selection:
  top_n: 5
  min_match_score: 50.0
  default_top_n: 5
  rebalance_frequency_days: 5
  eval_historical_window_days: 30
strategies:
  short_term_strategy:
    enabled: true
    score_multiplier: 0.1
    max_raw_score: 100.0
    short_term_gain_min: 1.0
    short_term_gain_max: 5.0
    short_term_volume_ratio_threshold: 1.5
    short_term_volume_avg_threshold: 1.5
  ma_golden_cross:
    enabled: true
    score_multiplier: 0.1
    max_raw_score: 100.0
    ma_golden_cross_fast_period: 5
    ma_golden_cross_slow_period: 20
  volume_breakout:
    enabled: true
    score_multiplier: 0.8
    max_raw_score: 100.0
    volume_breakout_lookback_days: 20
    volume_breakout_multiplier: 2.0
sector:
  enable_sector_analysis: true
  sector_hot_threshold: 2.0
  sector_cache_ttl: 1800
  sector_bonus_low: 3.0
  sector_bonus_mid: 5.0
  sector_bonus_high: 10.0
  sector_bonus_threshold_low: 2.0
  sector_bonus_threshold_high: 5.0
weights:
  price_condition_weight: 20.0
  volume_condition_weight: 20.0
  technical_indicator_weight: 25.0
  market_condition_weight: 15.0
  trend_condition_weight: 20.0
logging:
  log_level: INFO
  debug_strategy_execution: false
extra_config: {}
