# 六维选股策略回测配置

# 选股策略配置
# 说明：
# - enabled: 是否启用该策略 (true/false)
# - multiplier: 策略评分乘数 (1.0 为默认值)
# - 默认使用六维选股策略，如需使用其他策略可在此配置
strategies:
  # 六维选股策略（综合策略，包含以下5个子策略）
  six_dimension_selector:
    enabled: true
    multiplier: 1.0
  # 主力操盘买入信号
  main_trading_buy_signal:
    enabled: false
    multiplier: 1.0
  # 庄家控盘选股
  banker_control_selector:
    enabled: false
    multiplier: 1.0
  # 动能二号红色柱
  momentum_2_red_pillar_python:
    enabled: false
    multiplier: 1.0
  # 共振追涨
  resonance_chase:
    enabled: false
    multiplier: 1.0
  # 强势起爆选股
  strong_detonation_selector:
    enabled: false
    multiplier: 1.0
  
  # 均线金叉(Python)
  ma_golden_cross_python:
    enabled: false
    multiplier: 1.0
  
  # 短期策略(Python)
  short_term_strategy_python:
    enabled: false
    multiplier: 1.0
  
  # 成交量突破(Python)
  volume_breakout_python:
    enabled: false
    multiplier: 1.0
  
  # 龙头策略组合（包含龙头启动、龙头主升、龙头二波）
  dragon_leader:
    enabled: true
    multiplier: 1.0
  # 龙头启动策略
  dragon_leader_start:
    enabled: false
    multiplier: 1.0
  # 龙头主升策略
  dragon_leader_main_rise:
    enabled: false
    multiplier: 1.0
  # 龙头二波策略
  dragon_leader_second_wave:
    enabled: false
    multiplier: 1.0
  
  # 领涨选股(Python)
  top_rise_stock_selector:
    enabled: false
    multiplier: 1.0

# 选股配置
selection:
  # 最小匹配分数（0-100）
  min_match_score: 50.0
  # 默认返回Top N股票
  default_top_n: 10
  # 是否启用多线程选股
  enable_multithreading: true
  # 多线程工作线程数
  multithreading_workers: 15

# 初始资金（元）
initial_capital: 100000.0

# 手续费率
commission_rate: 0.001

# 滑点率（千分之一）
slippage_rate: 0.001

# 无风险利率（年化2.5%）
# 无风险利率是指将资金投资于某一项没有任何风险的投资对象而能得到的利息率。
# 在回测中，无风险利率用于计算夏普比率、卡尔马比率等风险调整收益指标。
# 通常使用一年期国债收益率或银行定期存款利率作为无风险利率。
risk_free_rate: 0.025

# 回测开始日期（YYYY-MM-DD格式）
start_date: "2025-01-01"

# 回测结束日期（YYYY-MM-DD格式）
end_date: "2026-04-03"

# 股票池范围：沪A主板 + 深A主板
# 过滤规则（与stock_selector一致）：
# - 保留：60开头（沪市主板）、00开头（深市主板）
# - 过滤：688开头（科创板）、300/301开头（创业板）、8/43/83/87/92开头（北交所）、ST股票
# 注：如果设置为空列表[]，回测系统将自动从stock_pool获取完整的沪A+深A主板股票列表
stock_pool: []

# 止盈止损配置
# 说明：
# - stop_loss_pct: 止损百分比（例如：0.05 表示 5% 止损）
# - take_profit_pct: 止盈百分比（例如：0.10 表示 10% 止盈）
# - 优先级：如果设置了百分比，则使用百分比计算止盈止损价；
#   如果没有设置（为null），则使用AI分析生成的具体价格
stop_loss_pct: 0.05
take_profit_pct: 0.15
# 最高持仓数
max_positions: 1
max_holding_days: 10